name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [wasm-updated]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Configure git for private deps
        run: |
          git config --global url."https://x-access-token:${{ secrets.PROTOCOL_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: 'true'

      - name: Set Cargo to use git CLI
        run: |
          mkdir -p ~/.cargo
          echo '[net]' >> ~/.cargo/config.toml
          echo 'git-fetch-with-cli = true' >> ~/.cargo/config.toml

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            */wasm-bridge/target
          key: wasm-${{ hashFiles('**/Cargo.lock') }}

      - name: Build all WASM bridges
        run: |
          for action in encode json http emit audit; do
            echo "::group::$action"
            (cd "$action/wasm-bridge" && wasm-pack build --target nodejs --release)
            echo "::endgroup::"
          done

      - name: Verify WASM sizes
        run: |
          MAX_SIZE=2097152  # 2MB
          for action in encode json http emit audit; do
            wasm=$(find "$action/wasm-bridge/pkg" -name "*_bg.wasm" | head -1)
            size=$(wc -c < "$wasm" | tr -d ' ')
            if [ "$size" -gt "$MAX_SIZE" ]; then
              echo "ERROR: $action WASM is $size bytes (max $MAX_SIZE)"
              exit 1
            fi
            echo "OK: $action ($size bytes)"
          done

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Test encode action
        run: |
          node -e "
          const wasm = require('./encode/wasm-bridge/pkg/w3_encode_wasm.js');
          const assert = require('assert');

          // Base64
          assert.strictEqual(wasm.base64_encode(Buffer.from('hello')), 'aGVsbG8=');
          assert.deepStrictEqual([...wasm.base64_decode('aGVsbG8=')], [...Buffer.from('hello')]);

          // Hex
          assert.strictEqual(wasm.hex_encode(Buffer.from([0xde, 0xad])), 'dead');

          // SHA-256
          const hash = Buffer.from(wasm.sha256(Buffer.from('hello'))).toString('hex');
          assert.strictEqual(hash, '2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824');

          // HMAC
          const mac = Buffer.from(wasm.hmac_sha256(Buffer.from('Jefe'), Buffer.from('what do ya want for nothing?'))).toString('hex');
          assert.strictEqual(mac, '5bdcc146bf60754e6a042426089575c75a003f089d2739839dec58b964ec3843');

          console.log('encode: all tests passed');
          "

      - name: Test json action
        run: |
          node -e "
          const wasm = require('./json/wasm-bridge/pkg/w3_json_wasm.js');
          const assert = require('assert');

          // Extract
          assert.strictEqual(wasm.extract('{\"a\":{\"b\":1}}', 'a.b'), '1');

          // Merge
          const merged = JSON.parse(wasm.merge('{\"a\":1}', '{\"b\":2}'));
          assert.deepStrictEqual(merged, {a: 1, b: 2});

          // Filter
          const filtered = JSON.parse(wasm.filter('[{\"x\":1},{\"x\":2}]', 'x', '1'));
          assert.strictEqual(filtered.length, 1);

          console.log('json: all tests passed');
          "

      - name: Test audit action
        run: |
          node -e "
          const wasm = require('./audit/wasm-bridge/pkg/w3_audit_wasm.js');
          const assert = require('assert');

          wasm.reset_sequence();
          const e1 = JSON.parse(wasm.create_entry('test', 'msg1', '{}', 'wf', 'job', 'step', '2026-01-01T00:00:00Z'));
          const e2 = JSON.parse(wasm.create_entry('test', 'msg2', '{}', '', '', '', '2026-01-01T00:00:01Z'));
          assert.strictEqual(e1.sequence, 1);
          assert.strictEqual(e2.sequence, 2);
          assert.strictEqual(e1.workflow, 'wf');
          assert.strictEqual(e2.workflow, null);

          console.log('audit: all tests passed');
          "

      - name: Test emit action
        run: |
          node -e "
          const wasm = require('./emit/wasm-bridge/pkg/w3_emit_wasm.js');
          const assert = require('assert');

          // Without secret
          const r1 = JSON.parse(wasm.prepare_event('test', '{\"k\":\"v\"}', 'wf', 'step', '2026-01-01T00:00:00Z', ''));
          assert.ok(r1.body.includes('test'));
          assert.strictEqual(r1.signature, null);

          // With secret
          const r2 = JSON.parse(wasm.prepare_event('test', '{}', '', '', '2026-01-01T00:00:00Z', 'secret'));
          assert.ok(r2.signature.startsWith('sha256='));

          console.log('emit: all tests passed');
          "
